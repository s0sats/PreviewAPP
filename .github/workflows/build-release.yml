name: Build & Release AAB

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Clona o PRJ001
      - name: Checkout PreviewAPP
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Clona a library em pasta separada
      - name: Checkout PreviewLibrary (Library)
        uses: actions/checkout@v4
        with:
          repository: s0sats/PreviewLibrary   # <- troque aqui
          token: ${{ secrets.GH_PAT }}
          path: nm-library

      # 3. Setup JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # 5. Define o path do maven local para a library
      - name: Set CI Maven Repo path
        run: echo "CI_MAVEN_REPO=${{ github.workspace }}/namoa-lib-local" >> $GITHUB_ENV

      # 6. Publica a library no Maven local do runner
      - name: Build & Publish Library locally
        working-directory: nm-library
        run: |
          chmod +x gradlew
          ./gradlew :namoa_library:publishReleasePublicationToCIRepository

      # 7. Decodifica o keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" > /tmp/keystore_base64.txt
          base64 -d /tmp/keystore_base64.txt > ${{ github.workspace }}/app/keystore.jks
          # Valida se o arquivo foi gerado corretamente
          file ${{ github.workspace }}/app/keystore.jks

      # 8. Gera o AAB productionGPRelease assinado
      - name: Build AAB (productionGPRelease)
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleProductionGPRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 9. Encontra o AAB gerado
      - name: Find AAB
        run: |
          AAB_PATH=$(find app/build/outputs/bundle -name "*.aab" | head -1)
          echo "AAB_PATH=$AAB_PATH" >> $GITHUB_ENV
          echo "AAB encontrado: $AAB_PATH"

      # 10. Define a versão da Release com base no versionName
      - name: Get version name
        run: |
          VERSION=$(grep -m1 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)"/\1/')
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "RELEASE_TAG=v${VERSION}-pr${PR_NUMBER}" >> $GITHUB_ENV
          echo "RELEASE_NAME=Release ${VERSION} (PR #${PR_NUMBER})" >> $GITHUB_ENV

      # 11. Cria a Release no GitHub com o AAB
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: |
            AAB gerado automaticamente pelo PR #${{ github.event.pull_request.number }}
            
            **Branch:** `${{ github.head_ref }}`
            **Commit:** `${{ github.sha }}`
            **Flavor:** productionRelease
          files: ${{ env.AAB_PATH }}
          prerelease: true   # PR = pre-release; mude para false no merge na main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
