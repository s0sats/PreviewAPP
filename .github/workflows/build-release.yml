name: Build & Release AAB

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Clona o PreviewAPP
      - name: Checkout PreviewAPP
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Clona a library em pasta separada
      - name: Checkout PreviewLibrary
        uses: actions/checkout@v4
        with:
          repository: s0sats/PreviewLibrary
          token: ${{ secrets.GH_PAT }}
          path: nm-library

      # 3. Setup JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 4. Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # 5. Define o path do maven local para a library
      - name: Set CI Maven Repo path
        shell: pwsh
        run: |
          $repoPath = "$env:GITHUB_WORKSPACE\namoa-lib-local"
          New-Item -ItemType Directory -Force -Path $repoPath
          echo "CI_MAVEN_REPO=$repoPath" >> $env:GITHUB_ENV

      # 6. Publica a library no Maven local do runner
      - name: Build & Publish Library locally
        working-directory: nm-library
        shell: pwsh
        run: |
          .\gradlew.bat :namoa_library:publishReleasePublicationToCIRepository
        env:
          CI_MAVEN_REPO: ${{ github.workspace }}\namoa-lib-local

      # 7. Confirma que a library foi publicada
      - name: Verify library was published
        shell: pwsh
        run: |
          Get-ChildItem -Recurse "$env:GITHUB_WORKSPACE\namoa-lib-local" | Select-Object FullName

      # 8. Decodifica o keystore
      - name: Decode Keystore
        shell: pwsh
        run: |
          $bytes = [System.Convert]::FromBase64String("${{ secrets.KEYSTORE_BASE64 }}")
          [System.IO.File]::WriteAllBytes("$env:GITHUB_WORKSPACE\app\keystore.jks", $bytes)

      # 9. Gera o AAB productionGPRelease assinado
      - name: Build AAB (productionGPRelease)
        shell: pwsh
        run: |
          .\gradlew.bat :app:bundleProductionGPRelease `
            "-Pandroid.injected.signing.store.file=$env:GITHUB_WORKSPACE\app\keystore.jks" `
            "-Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }}" `
            "-Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}" `
            "-Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}"
        env:
          CI_MAVEN_REPO: ${{ github.workspace }}\namoa-lib-local

      # 11. Encontra o AAB, APK e zipa o Mapping
      - name: Find artifacts and zip Mapping
        shell: pwsh
        run: |
          $aabPath = Get-ChildItem -Recurse "app\build\outputs\bundle" -Filter "*.aab" | Select-Object -First 1 -ExpandProperty FullName

          $mappingDir = Get-ChildItem -Recurse "app\build\outputs\mapping" -Directory | Select-Object -First 1 -ExpandProperty FullName
          $mappingZip = "$env:GITHUB_WORKSPACE\mapping.zip"
          Compress-Archive -Path "$mappingDir\*" -DestinationPath $mappingZip

          echo "AAB_PATH=$aabPath" >> $env:GITHUB_ENV
          echo "APK_PATH=$apkPath" >> $env:GITHUB_ENV
          echo "MAPPING_ZIP=$mappingZip" >> $env:GITHUB_ENV
          echo "AAB: $aabPath"
          echo "APK: $apkPath"
          echo "Mapping: $mappingZip"

      # 12. Define a versГЈo da Release
      - name: Get version name
        shell: pwsh
        run: |
          $content = Get-Content "app\build.gradle.kts" | Select-String 'versionName = "(.+)"' | Select-Object -First 1
          $version = $content -replace '.*versionName = "(.+)".*', '$1'
          $prNumber = "${{ github.event.pull_request.number }}"
          echo "RELEASE_TAG=v$version-pr$prNumber" >> $env:GITHUB_ENV
          echo "RELEASE_NAME=рџљЂ Release $version (PR #$prNumber)" >> $env:GITHUB_ENV

      # 13. Gera o resumo dos Гєltimos commits
      - name: Get commit history
        shell: pwsh
        run: |
          $prNumber = "${{ github.event.pull_request.number }}"
          $prUrl = "https://github.com/${{ github.repository }}/pull/$prNumber"
          $branch = "${{ github.head_ref }}"
          $commits = git log -10 --pretty=format:"- %s (%an)" | Out-String

          $notes = @"
          ## рџ“‹ InformaГ§Гµes
          | | |
          |---|---|
          | рџ”Ђ **PR** | [#$prNumber]($prUrl) |
          | рџЊї **Branch** | ``$branch`` |
          | рџ“¦ **Flavor** | productionGP + development |

          ## рџ“ќ Гљltimos commits
          $commits

          ## рџ“Ѓ Arquivos
          - рџ“¦ ``app-productionGP-release.aab`` вЂ” build de produГ§ГЈo (Google Play)
          - рџ› пёЏ ``app-development-debug.apk`` вЂ” build de desenvolvimento
          - рџ—єпёЏ ``mapping.zip`` вЂ” arquivos de ofuscaГ§ГЈo (ProGuard)
          "@

          $notes | Out-File -FilePath "release_notes.md" -Encoding utf8

      # 14. Cria a Release no GitHub
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body_path: release_notes.md
          files: |
            ${{ env.AAB_PATH }}
            ${{ env.APK_PATH }}
            ${{ env.MAPPING_ZIP }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
